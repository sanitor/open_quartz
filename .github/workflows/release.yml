name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and upload
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Open Quartz ${{ github.ref_name }}'
          releaseBody: |
            ## Features

            - **Math nodes** — 29 CPU-based math operations across 6 categories. Pure JS computation, no GPU shader compilation. Compact amber nodes with operation symbols.
            - **Auto type system** — `auto` DataType for Math ports, inferred from connected peers. Widest-type promotion.
            - **System source nodes** — TIME, TIME DELTA, FRAME, MOUSE, RESOLUTION as dedicated nodes. Green header, read-only live values.
            - **SOURCE menu** — renamed from INPUT, reorganized into SYSTEM / CONSTANTS / EXTERNAL groups.
            - **MATH menu** — new toolbar dropdown with 6 category sub-menus.
            - **Math SidePanel** — switchable operation, type inference display, editable defaults.
            - **Engine math pipeline** — `scalarUpstream` map for math→shader propagation. Math→Math chaining.
            - **113 new tests** — 756 total tests, mathOps.ts 100% coverage.

            ## Fixes

            - System source nodes no longer compile shader (eliminates dual-output GLSL error)
            - Video thumbnail shows first frame instead of blank
            - Video preview no longer auto-plays in non-play state
            - Math→shader value propagation via scalarUpstream map
            - System source inputMode correctly set
            - isConnectionValid handles auto type connections
          releaseDraft: false
          prerelease: true
